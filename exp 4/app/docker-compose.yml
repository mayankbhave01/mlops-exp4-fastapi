version: '3.8'

services:
  ml-api:
    build: .
    container_name: ml-api-container
    ports:
      - "8000:8000"

    volumes:
      - ./models:/app/models

    environment:
      - LOG_LEVEL=info

    restart: unless-stopped

    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3